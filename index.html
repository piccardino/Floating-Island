<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Floating Island</title>
    <script type="module" crossorigin src="/assets/main-CTx2sG_0.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/styles-BtI0CA1N.css">
  </head>
  <body>
    <main id="app">
      <canvas id="scene"></canvas>
      <section id="light-controls" aria-label="Controlli luce">
        <div class="control-row">
          <div class="control-label">
            <label for="saturation">Saturazione</label>
            <output id="saturation-value" for="saturation">1.00</output>
          </div>
          <input id="saturation" type="range" min="0" max="3" step="0.05" value="1" data-saturation-param="saturation" />
        </div>
        <div class="control-row">
          <div class="control-label">
            <label for="light-intensity">Intensità</label>
            <output id="light-intensity-value" for="light-intensity">1.60</output>
          </div>
          <input id="light-intensity" type="range" min="0" max="8" step="0.05" value="1.6" data-light-param="intensity" />
        </div>
        <div class="control-row">
          <div class="control-label">
            <label for="light-azimuth">Direzione</label>
            <output id="light-azimuth-value" for="light-azimuth">60°</output>
          </div>
          <input id="light-azimuth" type="range" min="-180" max="180" step="1" value="60" data-light-param="azimuth" />
        </div>
        <div class="control-row">
          <div class="control-label">
            <label for="light-elevation">Altezza</label>
            <output id="light-elevation-value" for="light-elevation">53°</output>
          </div>
          <input id="light-elevation" type="range" min="8" max="80" step="1" value="53" data-light-param="elevation" />
        </div>
        <div class="control-row">
          <div class="control-label">
            <label for="light-ambient">Ambiente</label>
            <output id="light-ambient-value" for="light-ambient">0.40</output>
          </div>
          <input id="light-ambient" type="range" min="0" max="2.4" step="0.05" value="0.4" data-light-param="ambient" />
        </div>
        <p id="light-vector">x 10.0 · y 16.0 · z 9.0</p>
      </section>
      <div id="loader" aria-live="polite">
        <div id="loader-bar">
          <span id="loader-progress"></span>
        </div>
        <p id="loader-text">Caricamento 0%</p>
      </div>
    </main>
  </body>
</html>
